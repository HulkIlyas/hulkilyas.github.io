<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ilyas Elmousaouy</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }

    .box {
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 40px 50px;
      text-align: center;
      max-width: 400px;
      width: 90%;
    }

    .status {
      display: inline-block;
      background: #e6f9ef;
      color: #27ae60;
      border: 1px solid #27ae60;
      border-radius: 4px;
      padding: 4px 12px;
      font-size: 13px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 22px;
      color: #222;
      margin: 0 0 6px;
    }

    p.role {
      font-size: 14px;
      color: #888;
      margin: 0 0 24px;
    }

    hr {
      border: none;
      border-top: 1px solid #eee;
      margin-bottom: 20px;
    }

    p.message {
      font-size: 14px;
      color: #555;
      line-height: 1.6;
      margin: 0 0 24px;
    }

    .footer {
      font-size: 12px;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="status">✓ Site en ligne</div>
    <h1>Ilyas Elmousaouy</h1>
    <p class="role">Étudiant</p>
    <hr/>
    <p class="message">Le site est opérationnel et fonctionne correctement.</p>
    <p class="footer">© 2026 Ilyas Elmousaouy</p>
  </div>
</body>
</html>
